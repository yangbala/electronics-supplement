<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子學補充教材</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">⚡ 電子學補充教材</a>
  </nav>
  <div class="container">
    <div style="padding: 20px 0 16px;">
      <h1 style="font-size:1.3rem; margin-bottom:6px; color:var(--text);">單元一覽</h1>
      <p style="color:var(--text-muted); font-size:0.9rem;">選擇一個主題開始學習</p>
    </div>
    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:14px;">
      <a href="pages/poles-zeros.html" style="text-decoration:none;">
        <div class="panel" style="padding:18px; cursor:pointer; transition:border-color 0.2s;"
             onmouseover="this.style.borderColor='#4a9eff'"
             onmouseout="this.style.borderColor='#30363d'">
          <div style="font-size:1.3rem; margin-bottom:8px;">📐</div>
          <h3 style="font-size:0.95rem; margin-bottom:5px; color:var(--text);">極點與零點</h3>
          <p style="font-size:0.83rem; color:var(--text-muted); line-height:1.5;">探索極點零點在左右半平面對系統穩定性、時域與頻域響應的影響</p>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
